name: Sync GOBL Data & Deploy

on:
  # Manual trigger
  workflow_dispatch:

  # Weekly sync every Monday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'

  # Also rebuild on push to main (normal development)
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gobl.map
        uses: actions/checkout@v4

      - name: Checkout GOBL repo (for latest regime data)
        uses: actions/checkout@v4
        with:
          repository: invopop/gobl
          path: gobl-source
          sparse-checkout: |
            data/regimes
            data/addons

      - name: Sync regime and addon data
        run: |
          cp gobl-source/data/regimes/*.json src/lib/data/regimes/
          cp gobl-source/data/addons/*.json src/lib/data/addons/
          echo "Synced $(ls src/lib/data/regimes/ | wc -l) regimes and $(ls src/lib/data/addons/ | wc -l) addons"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
