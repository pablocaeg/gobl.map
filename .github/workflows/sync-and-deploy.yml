name: Sync GOBL Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: invopop/gobl
          path: gobl-source
          sparse-checkout: |
            data/regimes
            data/addons

      - name: Sync data
        run: |
          cp gobl-source/data/regimes/*.json src/lib/data/regimes/
          cp gobl-source/data/addons/*.json src/lib/data/addons/
          echo "Synced $(ls src/lib/data/regimes/ | wc -l) regimes, $(ls src/lib/data/addons/ | wc -l) addons"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/lib/data/
          git diff --staged --quiet || git commit -m "sync: update regime and addon data from invopop/gobl"
          git push
